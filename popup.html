<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>YouTube Bookmarks</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 280px;
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f0f0f;
      color: #f1f1f1;
      padding: 12px;
    }

    h2 {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #aaa;
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid #272727;
    }

    .empty {
      color: #717171;
      font-size: 13px;
      padding: 8px 0;
    }

    .bookmark-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 0;
      border-bottom: 1px solid #272727;
    }

    .bookmark-row:last-child {
      border-bottom: none;
    }

    .bookmark-label {
      flex: 1;
      font-size: 14px;
      font-variant-numeric: tabular-nums;
      color: #f1f1f1;
    }

    .btn {
      font-size: 11px;
      padding: 3px 9px;
      border-radius: 3px;
      border: 1px solid #3f3f3f;
      cursor: pointer;
      background: #272727;
      color: #f1f1f1;
      transition: background 0.1s ease;
    }

    .btn:hover {
      background: #3f3f3f;
    }

    .btn-jump {
      border-color: #ff4e45;
      color: #ff4e45;
    }

    .btn-jump:hover {
      background: #ff4e4520;
    }

    .btn-delete:hover {
      background: #3f3f3f;
      color: #aaa;
    }
  </style>
</head>
<body>
  <h2>Bookmarks</h2>
  <div id="bookmark-list"></div>
  <script src="popup.js"></script>
</body>
</html>
